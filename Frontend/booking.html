<section class="container">

<h2>Booking Form</h2>

<form id="bookingForm" enctype="multipart/form-data">

<div class="inputBox">
<label>Full Name</label>
<input type="text" name="fullName" placeholder="Enter your name" required>
</div>

<div class="inputBox">
<label>Mobile Number</label>
<input type="tel" name="phone" placeholder="Enter mobile number" required>
</div>

<div class="inputBox">
<label>Email</label>
<input type="email" name="email" placeholder="Enter email" required>
</div>

<div class="inputBox">
<label>Event Type</label>
<select name="photoshootType" required>
<option>Wedding</option>
<option>Pre Wedding</option>
<option>Haldi</option>
<option>Mehendi</option>
<option>Engagement</option>
<option>Birthday</option>
<option>Maternity</option>
<option>Baby Shoot</option>
<option>Halfsaree</option>
<option>Corporate Event</option>
</select>
</div>

<div class="inputBox">
<label>Event Date</label>
<input type="date" name="date" required>
</div>

<div class="inputBox">
<label>Event Time</label>
<input type="time" name="time" required>
</div>

<div class="inputBox">
<label>Event Location</label>
<input type="text" name="location" placeholder="Enter location">
</div>

<div class="inputBox">
<label>No. of People</label>
<input type="number" name="people" placeholder="Enter number of people" min="1">
</div>

<div class="inputBox">
<label>Message</label>
<textarea name="requirements" placeholder="Write your requirements..."></textarea>
</div>

<div class="inputBox">
<label>Reference Image</label>
<input type="file" name="referenceImage" accept="image/*">
</div>

<button class="btn" type="submit">Submit Booking</button>

</form>

<script>
document.getElementById('bookingForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const form = e.target;
  const url = 'http://localhost:8000/booking';
  const data = new FormData(form);

  try {
    const response = await fetch(url, {
      method: 'POST',
      body: data,
    });

    const result = await response.json();

    if (response.ok && result.success) {
      alert('Booking request submitted successfully.');
      form.reset();
    } else {
      alert('Booking failed: ' + (result.message || 'Please try again.'));
    }
  } catch (error) {
    alert('Booking failed: ' + error.message);
  }
});
</script>
